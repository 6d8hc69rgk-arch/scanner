<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Скринер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f7;
            color: #1c1c1e;
            font-family: -apple-system, Helvetica, sans-serif;
            font-size: 13px;
            padding: 12px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid #d1d1d6;
            padding-bottom: 10px;
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #000;
        }
        .status {
            font-size: 22px;
        }
        .exchange-section {
            margin-bottom: 24px;
            background: #ffffff;
            border-radius: 14px;
            padding: 12px 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .exchange-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
            color: #1c1c1e;
            padding-left: 4px;
        }
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            min-width: 500px;
        }
        th {
            background: #f2f2f7;
            color: #3a3a3c;
            font-weight: 500;
            padding: 6px 4px;
            border-bottom: 1px solid #e5e5ea;
            text-align: center;
        }
        td {
            padding: 6px 4px;
            border-bottom: 1px solid #e5e5ea;
            text-align: center;
            white-space: nowrap;
        }
        .symbol { font-weight: 600; color: #000; text-align: left; }
        .price { color: #3a3a3c; }
        .volume { color: #000; font-weight: 500; }
        .bid { color: #555; }
        .ask { color: #555; }
        .life { color: #8e8e93; font-size: 10px; }
        .no-data { text-align: center; padding: 20px 0; color: #8e8e93; font-size: 13px; }
        .footer { margin-top: 12px; text-align: center; color: #8e8e93; font-size: 9px; border-top: 1px solid #d1d1d6; padding-top: 10px; }
        @media (max-width: 480px) {
            body { padding: 8px; font-size: 11px; }
            th, td { padding: 4px 2px; font-size: 10px; }
            .table-wrap { min-width: 400px; }
            .title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Скринер</div>
        <div class="status" id="status">⏳</div>
    </div>

    <div id="exchanges">
        <div class="exchange-section" id="binance-section">
            <div class="exchange-title">🟡 Binance</div>
            <div class="table-wrap">
                <table>
                    <thead><tr>
                        <th>Монета</th><th>Цена</th><th>BID</th><th>Объём BID</th><th>ASK</th><th>Объём ASK</th><th>Живёт BID</th><th>Живёт ASK</th>
                    </tr></thead>
                    <tbody id="binance-tbody"><tr><td colspan="8" class="no-data">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </div>
        <div class="exchange-section" id="okx-section">
            <div class="exchange-title">🔵 OKX</div>
            <div class="table-wrap">
                <table>
                    <thead><tr>
                        <th>Монета</th><th>Цена</th><th>BID</th><th>Объём BID</th><th>ASK</th><th>Объём ASK</th><th>Живёт BID</th><th>Живёт ASK</th>
                    </tr></thead>
                    <tbody id="okx-tbody"><tr><td colspan="8" class="no-data">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </div>
        <div class="exchange-section" id="bybit-section">
            <div class="exchange-title">🟣 Bybit</div>
            <div class="table-wrap">
                <table>
                    <thead><tr>
                        <th>Монета</th><th>Цена</th><th>BID</th><th>Объём BID</th><th>ASK</th><th>Объём ASK</th><th>Живёт BID</th><th>Живёт ASK</th>
                    </tr></thead>
                    <tbody id="bybit-tbody"><tr><td colspan="8" class="no-data">Загрузка...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="footer">обновление каждые 5 сек</div>

    <script>
        const statusEl = document.getElementById('status');
        const tbodyMap = {
            'binance': document.getElementById('binance-tbody'),
            'okx': document.getElementById('okx-tbody'),
            'bybit': document.getElementById('bybit-tbody')
        };

        async function fetchData() {
            try {
                const resp = await fetch('/data');
                if (!resp.ok) throw new Error('Ошибка сети');
                const data = await resp.json();
                statusEl.textContent = '✅';
                statusEl.style.color = '#34c759';
                for (const [exchange, rows] of Object.entries(data)) {
                    const tbody = tbodyMap[exchange];
                    if (!tbody) continue;
                    if (rows.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="8" class="no-data">Нет аномалий</td></tr>';
                    } else {
                        let html = '';
                        rows.forEach(row => {
                            html += `<tr>
                                <td class="symbol">${row.symbol}</td>
                                <td class="price">${row.price}</td>
                                <td class="bid">${row.bid_price}</td>
                                <td class="volume">${row.bid_vol}</td>
                                <td class="ask">${row.ask_price}</td>
                                <td class="volume">${row.ask_vol}</td>
                                <td class="life">${row.bid_life}</td>
                                <td class="life">${row.ask_life}</td>
                            </tr>`;
                        });
                        tbody.innerHTML = html;
                    }
                }
            } catch (e) {
                statusEl.textContent = '⚠️';
                statusEl.style.color = '#ff9500';
            }
        }

        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
